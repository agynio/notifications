name: Kind Smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
      IMAGE_NAME: agynio/notifications
      IMAGE_TAG: e2e-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install buf
        run: |
          curl -sSL https://github.com/bufbuild/buf/releases/download/v1.64.0/buf-Linux-x86_64.tar.gz \
            | sudo tar -xzf - -C /usr/local --strip-components=1 buf/bin/buf

      - name: Install protoc plugins
        env:
          GOBIN: ${{ github.workspace }}/bin
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.34.2
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

      - name: Add GOBIN to PATH
        run: echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"

      - name: Generate protobufs
        run: make proto

      - name: Build container image
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        run: docker build -t "$IMAGE" .

      - name: Create kind cluster
        uses: helm/kind-action@v1.7.0
        with:
          cluster_name: notifications

      - name: Load image into kind
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        run: kind load docker-image --name notifications "$IMAGE"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install Redis
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm upgrade --install notifications-redis bitnami/redis \
            --set architecture=standalone \
            --set auth.enabled=false \
            --wait

      - name: Install notifications chart
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
          TAG: ${{ env.IMAGE_TAG }}
        run: |
          helm upgrade --install notifications ./charts/notifications \
            --set image.repository="$IMAGE" \
            --set image.tag="$TAG"

      - name: Bootstrap environment configuration
        run: |
          until kubectl get deployment/notifications >/dev/null 2>&1; do
            sleep 2
          done
          kubectl apply -f bootstrap/notifications-env.yaml
          kubectl rollout status deployment/notifications --timeout=180s

      - name: Smoke test
        env:
          SMOKE_GRPC_ADDR: localhost:9090
          SMOKE_REDIS_ADDR: redis://localhost:6379/0
          SMOKE_CHANNEL: notifications.v1
        run: |
          kubectl port-forward svc/notifications 9090:9090 &
          PF_NOTIFICATIONS=$!
          kubectl port-forward svc/notifications-redis-master 6379:6379 &
          PF_REDIS=$!
          cleanup() {
            kill $PF_NOTIFICATIONS $PF_REDIS 2>/dev/null || true
          }
          trap cleanup EXIT
          sleep 5
          go test ./test/smoke -run TestSmoke -count=1

      - name: Cleanup
        if: always()
        run: |
          helm uninstall notifications || true
          helm uninstall notifications-redis || true
          kind delete cluster --name notifications || true
